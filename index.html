<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lennox Dojo">
<meta name="theme-color" content="#0A0E1A">
<meta name="description" content="Ninjago Lennox Dojo - 12 Lern-Spiele für junge Ninja">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Ninjago Lennox Dojo 🥷</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Russo+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--ngold:#FFC700;--nred:#E63946;--nblue:#1D9BF0;--ngreen:#06D6A0;--nblack:#0A0E1A;--nwhite:#F8F9FA;--ndark:#1A1F2E;--npurple:#8B5CF6;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden;background:#0A0E1A;color:#fff;}
.screen{display:none;min-height:100vh;}.screen.active{display:block;}

/* Lightning bolts background */
.lightning-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bolt{position:absolute;width:2px;background:linear-gradient(180deg,transparent,#FFC700,transparent);opacity:0;animation:flash 8s ease-in-out infinite;}
@keyframes flash{0%,90%,100%{opacity:0;}92%,94%{opacity:.7;}}

/* Confetti */
.confetti-piece{position:fixed;width:11px;height:11px;border-radius:3px;animation:confettiFall 2.5s ease forwards;z-index:9999;pointer-events:none;}
@keyframes confettiFall{0%{transform:translateY(-40px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}

/* Spinjitzu spinner (used as decorative element) */
.spinjitzu{position:fixed;width:300px;height:300px;border-radius:50%;background:conic-gradient(from 0deg,transparent 0deg,#FFC700 90deg,transparent 180deg,#1D9BF0 270deg,transparent 360deg);opacity:.05;animation:spin 6s linear infinite;pointer-events:none;z-index:0;filter:blur(20px);}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.sp1{top:-100px;left:-100px;}
.sp2{bottom:-100px;right:-100px;animation-direction:reverse;}

@keyframes cardIn{from{transform:scale(.72) rotate(-4deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
@keyframes ninjaFloat{0%,100%{transform:translateY(0) rotate(-3deg);}50%{transform:translateY(-12px) rotate(3deg);}}
@keyframes ws{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}
@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(255,199,0,.3);}50%{box-shadow:0 0 30px rgba(255,199,0,.6);}}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 8px rgba(255,199,0,.5));}50%{filter:drop-shadow(0 0 18px rgba(255,199,0,.9));}}

/* HUB - Ninjago Dojo */
#screen-hub{background:radial-gradient(ellipse at top,#1A1F2E 0%,#0A0E1A 60%,#000 100%);min-height:100vh;}
#hub-content{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:28px 16px 60px;display:flex;flex-direction:column;align-items:center;}
.dojo-banner{position:relative;text-align:center;margin-bottom:8px;}
.ninja-icon{font-size:4.2rem;display:block;animation:ninjaFloat 3s ease-in-out infinite;margin-bottom:4px;filter:drop-shadow(0 0 18px rgba(255,199,0,.5));}
.hub-title{font-family:'Bangers',cursive;font-size:3.4rem;letter-spacing:4px;background:linear-gradient(180deg,#FFC700 0%,#FF6B00 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;text-shadow:none;-webkit-text-stroke:1.5px rgba(0,0,0,.3);margin-bottom:2px;}
.hub-subtitle{font-family:'Russo One',sans-serif;font-size:1.1rem;color:#FFC700;letter-spacing:4px;text-transform:uppercase;}
.hub-sub{font-size:.9rem;color:rgba(255,255,255,.6);font-weight:700;margin-top:6px;margin-bottom:22px;text-align:center;}
.hub-sub b{color:#FFC700;}
.section-label{font-family:'Russo One',sans-serif;font-size:.85rem;color:#FFC700;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;align-self:flex-start;display:flex;align-items:center;gap:8px;}
.section-label::before{content:'⚡';font-size:1rem;}
.games-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;width:100%;margin-bottom:18px;}
.game-card{border-radius:18px;padding:14px 8px 12px;text-align:center;cursor:pointer;border:2px solid transparent;transition:all .25s cubic-bezier(.34,1.56,.64,1);animation:cardReveal .6s cubic-bezier(.34,1.56,.64,1) both;background:none;font-family:inherit;position:relative;overflow:hidden;}
.game-card:nth-child(1){animation-delay:.05s;}.game-card:nth-child(2){animation-delay:.10s;}
.game-card:nth-child(3){animation-delay:.15s;}.game-card:nth-child(4){animation-delay:.20s;}
.game-card:nth-child(5){animation-delay:.25s;}.game-card:nth-child(6){animation-delay:.30s;}
.game-card:nth-child(7){animation-delay:.35s;}.game-card:nth-child(8){animation-delay:.40s;}
.game-card:nth-child(9){animation-delay:.45s;}.game-card:nth-child(10){animation-delay:.50s;}
.game-card:nth-child(11){animation-delay:.55s;}.game-card:nth-child(12){animation-delay:.60s;}
@keyframes cardReveal{from{transform:translateY(40px) scale(.8);opacity:0;}to{transform:translateY(0) scale(1);opacity:1;}}
.game-card.available{background:linear-gradient(180deg,rgba(26,31,46,.95),rgba(10,14,26,.95));backdrop-filter:blur(10px);border:2px solid rgba(255,199,0,.25);box-shadow:0 6px 24px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,199,0,.1);}
.game-card.available::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#FFC700,transparent);}
.game-card.available:hover{transform:translateY(-6px) scale(1.05);border-color:#FFC700;box-shadow:0 10px 30px rgba(255,199,0,.3),0 6px 24px rgba(0,0,0,.6);}
.game-card.available:active{transform:scale(.96);}
.game-icon-wrap{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:1.7rem;transition:transform .3s;border:2px solid rgba(255,255,255,.15);box-shadow:0 4px 12px rgba(0,0,0,.3);}
.game-card.available:hover .game-icon-wrap{transform:rotate(-10deg) scale(1.12);}
/* Ninja-team colors per game */
.theme-words .game-icon-wrap{background:linear-gradient(135deg,#06D6A0,#118A6F);border-color:#06D6A0;}
.theme-math .game-icon-wrap{background:linear-gradient(135deg,#1D9BF0,#0D5EAB);border-color:#1D9BF0;}
.theme-quiz .game-icon-wrap{background:linear-gradient(135deg,#FFC700,#FF8800);border-color:#FFC700;}
.theme-memory .game-icon-wrap{background:linear-gradient(135deg,#E63946,#A8202C);border-color:#E63946;}
.theme-shadow .game-icon-wrap{background:linear-gradient(135deg,#1A1F2E,#000);border:2px solid #FFC700;}
.theme-rhyme .game-icon-wrap{background:linear-gradient(135deg,#8B5CF6,#5B21B6);border-color:#8B5CF6;}
.theme-anlaut .game-icon-wrap{background:linear-gradient(135deg,#06D6A0,#1D9BF0);border-color:#06D6A0;}
.theme-clock .game-icon-wrap{background:linear-gradient(135deg,#F8F9FA,#9CA3AF);border-color:#F8F9FA;}
.theme-flags .game-icon-wrap{background:linear-gradient(135deg,#E63946,#FFC700);border-color:#FFC700;}
.theme-sequence .game-icon-wrap{background:linear-gradient(135deg,#FF6B00,#E63946);border-color:#FF6B00;}
.theme-odd .game-icon-wrap{background:linear-gradient(135deg,#8B5CF6,#E63946);border-color:#8B5CF6;}
.theme-compare .game-icon-wrap{background:linear-gradient(135deg,#06D6A0,#FFC700);border-color:#06D6A0;}
.game-name{font-family:'Russo One',sans-serif;font-size:.82rem;color:#fff;margin-bottom:3px;line-height:1.2;letter-spacing:.5px;}
.game-desc{font-size:.6rem;color:rgba(255,255,255,.55);font-weight:700;line-height:1.3;margin-bottom:7px;min-height:22px;}
.game-badge{display:inline-block;padding:3px 8px;border-radius:10px;font-size:.55rem;font-weight:800;letter-spacing:.5px;text-transform:uppercase;}
.badge-play{background:rgba(255,199,0,.2);color:#FFC700;border:1px solid rgba(255,199,0,.4);}
.badge-new{background:#E63946;color:white;}
.badge-hot{background:#FFC700;color:#0A0E1A;}
.age-tag{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.5);color:#FFC700;font-size:.5rem;font-weight:800;padding:2px 5px;border-radius:5px;border:1px solid rgba(255,199,0,.3);}
.hub-tagline{color:rgba(255,199,0,.5);font-size:.78rem;font-weight:700;margin-top:14px;font-family:'Russo One',sans-serif;letter-spacing:1px;text-transform:uppercase;}
.hub-tagline span{color:#FFC700;}

/* SHARED Buttons */
.back-btn-dark{align-self:flex-start;background:linear-gradient(180deg,rgba(26,31,46,.9),rgba(10,14,26,.9));border:1.5px solid rgba(255,199,0,.4);color:#FFC700;font-family:'Russo One',sans-serif;font-weight:700;font-size:.82rem;padding:7px 16px;border-radius:10px;cursor:pointer;margin-bottom:14px;transition:all .2s;display:inline-flex;align-items:center;gap:6px;letter-spacing:1px;text-transform:uppercase;}
.back-btn-dark:hover{background:rgba(255,199,0,.1);transform:translateX(-3px);}
.back-btn-light{align-self:flex-start;background:linear-gradient(180deg,rgba(26,31,46,.9),rgba(10,14,26,.9));border:1.5px solid rgba(255,199,0,.4);color:#FFC700;font-family:'Russo One',sans-serif;font-weight:700;font-size:.82rem;padding:7px 16px;border-radius:10px;cursor:pointer;margin-bottom:14px;transition:all .2s;display:inline-flex;align-items:center;gap:6px;letter-spacing:1px;text-transform:uppercase;}
.back-btn-light:hover{background:rgba(255,199,0,.1);transform:translateX(-3px);}
.progress-wrap{width:100%;max-width:380px;background:rgba(255,255,255,.08);border-radius:0;height:10px;margin-bottom:7px;overflow:hidden;border:1.5px solid rgba(255,199,0,.3);clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%);}
.progress-bar-inner{height:100%;transition:width .5s ease;}
.progress-label{font-size:.78rem;font-weight:700;margin-bottom:11px;color:#FFC700;font-family:'Russo One',sans-serif;letter-spacing:1.5px;text-transform:uppercase;}
.btn-row{display:flex;justify-content:center;flex-wrap:wrap;gap:9px;margin-top:12px;}
.results-list{text-align:left;margin:11px 0;max-height:220px;overflow-y:auto;}
.ri{display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:8px;margin-bottom:4px;font-weight:700;font-size:.85rem;}
.ri.ok{background:rgba(6,214,160,.15);color:#06D6A0;border-left:3px solid #06D6A0;}
.ri.nope{background:rgba(230,57,70,.15);color:#E63946;border-left:3px solid #E63946;}
.rtitle{font-family:'Bangers',cursive;font-size:2rem;margin-bottom:5px;letter-spacing:2px;}
.remoji{font-size:3.4rem;display:block;margin:6px 0;animation:bounce 1.5s ease-in-out infinite;}
.rscore{font-family:'Bangers',cursive;font-size:3rem;letter-spacing:2px;}
.btn-home,.btn-again{color:#0A0E1A;border:none;border-radius:10px;padding:11px 22px;font-family:'Russo One',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;transition:all .15s;letter-spacing:1.5px;text-transform:uppercase;}
.btn-home{background:linear-gradient(180deg,#06D6A0,#118A6F);box-shadow:0 4px 0 #064E3B;}
.btn-again{background:linear-gradient(180deg,#FFC700,#FF8800);box-shadow:0 4px 0 #B45309;}
.btn-home:hover,.btn-again:hover{transform:translateY(-3px);}
.feedback-line{font-family:'Russo One',sans-serif;font-size:1.15rem;margin-top:9px;min-height:30px;letter-spacing:1px;}
.feedback-line.good{color:#06D6A0;text-shadow:0 0 12px rgba(6,214,160,.5);}
.feedback-line.bad{color:#E63946;text-shadow:0 0 12px rgba(230,57,70,.5);}

/* WORDS - Lloyd green ninja theme */
#screen-words{background:radial-gradient(ellipse at top,#0d3d2e 0%,#062118 60%,#000 100%);min-height:100vh;}
#words-content{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:18px 13px 74px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.words-header{text-align:center;margin-bottom:14px;}
.words-header h1{font-family:'Bangers',cursive;font-size:2.4rem;color:#06D6A0;letter-spacing:3px;text-shadow:0 0 20px rgba(6,214,160,.5);}
.w-card,.w-results,.w-start{background:linear-gradient(180deg,rgba(13,61,46,.95),rgba(6,33,24,.95));border-radius:18px;padding:24px 19px;border:2px solid #06D6A0;box-shadow:0 0 30px rgba(6,214,160,.3),inset 0 1px 0 rgba(6,214,160,.2);width:100%;max-width:390px;text-align:center;animation:cardIn .4s cubic-bezier(.34,1.56,.64,1);position:relative;}
.w-card::before,.w-results::before,.w-start::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#06D6A0,transparent);}
.cat-badge{display:inline-block;background:rgba(6,214,160,.2);color:#06D6A0;font-size:.65rem;font-weight:800;padding:3px 12px;border-radius:8px;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;border:1px solid #06D6A0;font-family:'Russo One',sans-serif;}
.hint-emoji{font-size:2.8rem;margin-bottom:5px;display:block;animation:bounce 1s ease-in-out infinite;}
.hint-text{font-size:.85rem;color:rgba(255,255,255,.85);font-weight:700;margin-bottom:11px;}
.word-display{display:flex;justify-content:center;gap:6px;margin-bottom:15px;flex-wrap:wrap;}
.lb{width:42px;height:51px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Bangers',cursive;font-size:1.7rem;letter-spacing:1px;transition:all .3s;}
.lb.filled{background:rgba(29,155,240,.15);border:2px solid #1D9BF0;color:#1D9BF0;box-shadow:0 0 10px rgba(29,155,240,.3);}
.lb.blank{background:rgba(255,199,0,.1);border:2px dashed #FFC700;color:#FFC700;animation:wblink 1.5s ease-in-out infinite;}
@keyframes wblink{0%,100%{border-color:#FFC700;}50%{border-color:#FF8800;box-shadow:0 0 15px rgba(255,199,0,.5);}}
.lb.blank.sel{background:rgba(255,199,0,.2);border:2px solid #FFC700;animation:none;}
.lb.correct{background:rgba(6,214,160,.2)!important;border:2px solid #06D6A0!important;color:#06D6A0!important;animation:none!important;box-shadow:0 0 15px rgba(6,214,160,.5);}
.lb.wshake{animation:ws .4s ease!important;border-color:#E63946!important;background:rgba(230,57,70,.2)!important;color:#E63946!important;}
.w-choices{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:15px;}
.wc{width:46px;height:46px;border-radius:10px;border:none;font-family:'Bangers',cursive;font-size:1.5rem;cursor:pointer;transition:all .15s;position:relative;top:0;letter-spacing:1px;color:white;}
.wc:active:not(:disabled){top:3px;}
.wc:hover:not(:disabled){transform:translateY(-3px) scale(1.08);}
.wc:disabled{opacity:.35;cursor:default;transform:none;box-shadow:none;}
.wc0{background:linear-gradient(180deg,#E63946,#A8202C);box-shadow:0 4px 0 #6B0E18;}
.wc1{background:linear-gradient(180deg,#1D9BF0,#0D5EAB);box-shadow:0 4px 0 #053A6B;}
.wc2{background:linear-gradient(180deg,#06D6A0,#118A6F);box-shadow:0 4px 0 #064E3B;}
.wc3{background:linear-gradient(180deg,#FFC700,#FF8800);box-shadow:0 4px 0 #B45309;color:#0A0E1A;}
.btn-cw{background:linear-gradient(180deg,#06D6A0,#118A6F);color:#0A0E1A;border:none;border-radius:10px;padding:12px 34px;font-family:'Russo One',sans-serif;font-size:1rem;cursor:pointer;box-shadow:0 5px 0 #064E3B;transition:all .15s;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;}
.btn-cw:hover:not(:disabled){transform:translateY(-3px);}.btn-cw:disabled{opacity:.45;cursor:default;}
.btn-ws{background:linear-gradient(180deg,#FFC700,#FF8800);color:#0A0E1A;border:none;border-radius:12px;padding:14px 40px;font-family:'Bangers',cursive;font-size:1.4rem;cursor:pointer;box-shadow:0 6px 0 #B45309;transition:all .15s;letter-spacing:3px;text-transform:uppercase;}
.btn-ws:hover{transform:translateY(-3px);}
.stitle-w{font-family:'Bangers',cursive;font-size:1.8rem;color:#06D6A0;letter-spacing:2px;margin-bottom:8px;text-shadow:0 0 15px rgba(6,214,160,.4);}
.sdesc-w{font-size:.88rem;color:rgba(255,255,255,.85);font-weight:600;margin-bottom:15px;line-height:1.6;}
.pb-w{background:linear-gradient(90deg,#06D6A0,#FFC700);}

/* DARK GAME LAYOUT - Ninja base */
.dark-game{background:radial-gradient(ellipse at top,#1A1F2E 0%,#0A0E1A 60%,#000 100%);min-height:100vh;}
.dark-content{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:18px 13px 74px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.dark-header{text-align:center;margin-bottom:14px;}
.dark-header .gicon{font-size:2.8rem;display:block;margin-bottom:4px;animation:bounce 2.5s ease-in-out infinite;filter:drop-shadow(0 0 12px rgba(255,199,0,.5));}
.dark-header h1{font-family:'Bangers',cursive;font-size:2.3rem;line-height:1.1;letter-spacing:3px;}
.dark-header .gsub{font-size:.83rem;color:rgba(255,255,255,.65);font-weight:700;font-family:'Russo One',sans-serif;letter-spacing:1px;text-transform:uppercase;margin-top:4px;}
.glass-card,.glass-card-result,.glass-card-start{background:linear-gradient(180deg,rgba(26,31,46,.95),rgba(10,14,26,.95));backdrop-filter:blur(20px);border:2px solid rgba(255,199,0,.3);border-radius:18px;padding:26px 19px 22px;width:100%;max-width:400px;text-align:center;box-shadow:0 18px 55px rgba(0,0,0,.6),0 0 30px rgba(255,199,0,.1);position:relative;}
.glass-card{animation:cardIn .4s cubic-bezier(.34,1.56,.64,1);}
.glass-card-result{animation:cardIn .5s cubic-bezier(.34,1.56,.64,1);}
.glass-card::before,.glass-card-result::before,.glass-card-start::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#FFC700,transparent);}
.stitle-d{font-family:'Bangers',cursive;font-size:1.8rem;color:#FFC700;margin-bottom:9px;letter-spacing:2px;text-shadow:0 0 15px rgba(255,199,0,.4);}
.sdesc-d{font-size:.9rem;color:rgba(255,255,255,.8);font-weight:700;margin-bottom:15px;line-height:1.6;}
.gri{display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:8px;margin-bottom:4px;font-weight:700;font-size:.85rem;}
.gri.ok{background:rgba(6,214,160,.15);color:#06D6A0;border-left:3px solid #06D6A0;}.gri.nope{background:rgba(230,57,70,.15);color:#E63946;border-left:3px solid #E63946;}
.gri .ge{flex:1;font-size:.86rem;}

/* MATH - Jay blue ninja */
#screen-math{background:radial-gradient(ellipse at top,#0d2a4a 0%,#061830 60%,#000 100%)!important;min-height:100vh;}
#math-content{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:18px 13px 74px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.lvlsel{display:flex;gap:5px;margin-bottom:13px;background:rgba(0,0,0,.4);border-radius:10px;padding:4px;border:1.5px solid rgba(29,155,240,.3);}
.lvlbtn{padding:6px 14px;border-radius:7px;border:none;font-family:'Russo One',sans-serif;font-weight:700;font-size:.78rem;cursor:pointer;transition:all .2s;background:transparent;color:rgba(255,255,255,.5);letter-spacing:1px;text-transform:uppercase;}
.lvlbtn.active{background:linear-gradient(180deg,#1D9BF0,#0D5EAB);color:white;box-shadow:0 0 12px rgba(29,155,240,.5);}
.lvlbtn:hover:not(.active){color:#1D9BF0;}
.opbadge{display:inline-block;padding:4px 14px;border-radius:8px;font-size:.7rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;font-family:'Russo One',sans-serif;}
.oa{background:rgba(29,155,240,.2);color:#1D9BF0;border:1.5px solid #1D9BF0;}
.os{background:rgba(230,57,70,.2);color:#E63946;border:1.5px solid #E63946;}
.od{background:rgba(139,92,246,.2);color:#8B5CF6;border:1.5px solid #8B5CF6;}
.om{background:rgba(6,214,160,.2);color:#06D6A0;border:1.5px solid #06D6A0;}
.equation{font-family:'Bangers',cursive;font-size:2.7rem;color:white;margin-bottom:18px;letter-spacing:4px;line-height:1.2;text-shadow:0 0 20px rgba(29,155,240,.3);}
.eqop{color:#1D9BF0;}
.bnum{display:inline-block;min-width:50px;background:rgba(255,199,0,.1);border:2.5px dashed #FFC700;border-radius:8px;color:#FFC700;padding:0 7px;animation:wblink 1.5s ease-in-out infinite;}
.bnum.fi{border-style:solid;animation:none;background:rgba(255,199,0,.2);}

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(e=>console.log('SW failed',e));
  });
}
function show(n){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+n).classList.add('active');window.scrollTo(0,0);if(n==='words'){wPhase='start';wRender();}if(n==='math'){mPhase='start';mRender();}if(n==='quiz'){qPhase='start';qRender();}if(n==='memory'){memInit();}if(n==='shadow'){shInit();}if(n==='rhyme'){rhInit();}if(n==='anlaut'){anInit();}if(n==='clock'){clInit();}if(n==='flags'){flInit();}if(n==='sequence'){sqInit();}if(n==='odd'){odInit();}if(n==='compare'){cpInit();}}
function confetti(cols){for(let i=0;i<36;i++){const e=document.createElement('div');e.className='confetti-piece';e.style.left=Math.random()*100+'vw';e.style.background=cols[Math.floor(Math.random()*cols.length)];e.style.animationDelay=(Math.random()*.9)+'s';e.style.animationDuration=(1.5+Math.random()*1.4)+'s';e.style.borderRadius=Math.random()>.5?'50%':'3px';document.body.appendChild(e);setTimeout(()=>e.remove(),3400);}}
function makeLightning(id){const el=document.getElementById(id);if(!el)return;for(let i=0;i<8;i++){const b=document.createElement('div');b.className='bolt';const h=80+Math.random()*180;b.style.cssText=`height:${h}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*8}s;`;el.appendChild(b);}}
makeLightning('hub-lightning');
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function speakDE(text,rate){if(!('speechSynthesis' in window))return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='de-DE';u.rate=rate||0.9;u.pitch=1.1;const vs=window.speechSynthesis.getVoices();const dv=vs.find(v=>v.lang.startsWith('de'));if(dv)u.voice=dv;window.speechSynthesis.speak(u);return u;}
function backBtn(dark){return `<button class="back-btn-${dark?'dark':'light'}" onclick="window.speechSynthesis&&window.speechSynthesis.cancel();show('hub')">← Dojo</button>`;}
function endButtons(restart){return `<div class="btn-row"><button class="btn-home" onclick="show('hub')">🏯 Dojo</button><button class="btn-again" onclick="${restart}">⚡ Nochmal</button></div>`;}

function wSel2(l,b){document.querySelectorAll('.wc').forEach(x=>x.style.transform='');b.style.transform='scale(1.2)';setTimeout(()=>b.style.transform='',180);wSel=l;const bx=document.getElementById('wb');if(bx){bx.textContent=l;bx.classList.add('sel');}const ck=document.getElementById('wck');if(ck)ck.disabled=false;}
function wCheck(cor){const bx=document.getElementById('wb');const fb=document.getElementById('wfb');document.getElementById('wck').disabled=true;document.querySelectorAll('.wc').forEach(b=>b.disabled=true);const ok=wSel===cor;wRes.push({w:wR[wC].w,e:wR[wC].e,ok});if(ok){bx.className='lb correct';document.querySelectorAll('.lb').forEach(b=>b.classList.add('correct'));fb.textContent='🎉 Richtig!';fb.style.color='#43A047';confetti(['#FF6F00','#FFD700','#43A047']);}else{bx.className='lb wshake';fb.textContent=`❌ Es war "${cor}"`;fb.style.color='#E53935';setTimeout(()=>{bx.className='lb correct';bx.textContent=cor;},500);}setTimeout(()=>{wSel=null;wC++;if(wC>=10)wPhase='done';wRender();},1700);}

function genQ(lv){const ops=lv===1?['+','-']:lv===2?['+','-','×']:['+','-','×','÷'];const op=ops[Math.floor(Math.random()*ops.length)];let a,b,ans;if(op==='+'){if(lv===1){a=rnd(1,10);b=rnd(1,10);}else if(lv===2){a=rnd(5,50);b=rnd(5,50);}else{a=rnd(10,100);b=rnd(10,100);}ans=a+b;}else if(op==='-'){if(lv===1){a=rnd(2,15);b=rnd(1,a);}else if(lv===2){a=rnd(10,80);b=rnd(5,a);}else{a=rnd(20,150);b=rnd(10,a);}ans=a-b;}else if(op==='×'){if(lv===2){a=rnd(2,5);b=rnd(2,10);}else{a=rnd(2,12);b=rnd(2,12);}ans=a*b;}else{b=rnd(2,lv===3?12:5);ans=rnd(2,lv===3?12:8);a=b*ans;}return{a,b,op,ans,q:`${a} ${op} ${b} = ?`};}
function mGC(c){const s=new Set([c]);while(s.size<4){const d=Math.floor(Math.random()*8)+1;const w=Math.random()>.5?c+d:Math.max(0,c-d);if(w!==c)s.add(w);}return shuffle([...s]);}
function opI(op){if(op==='+')return['➕ Addition','oa'];if(op==='-')return['➖ Subtraktion','os'];if(op==='÷')return['➗ Division','od'];return['✖️ Multiplikation','om'];}
let mLv=1,mR=[],mC=0,mSel=null,mRes=[],mPhase='start';
function mInit(){mR=Array.from({length:10},()=>genQ(mLv));mC=0;mSel=null;mRes=[];mPhase='play';mRender();}

  if(mPhase==='start'){const ds=mLv===1?'<b>Leicht</b> — bis 20':mLv===2?'<b>Mittel</b> — bis 100, mal':'<b>Schwer</b> — alle 4 Arten';el.innerHTML=`${backBtn(true)}<div class="dark-header"><span class="gicon">🚀</span><h1 style="background:linear-gradient(135deg,#4CC9F0,#4361EE,#C77DFF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Blitz-Mathe</h1><div class="gsub">Unendlich viele Aufgaben!</div></div><div class="glass-card-start"><div style="font-size:2.2rem;margin-bottom:8px">🔢✨🧮</div><div class="stitle-d">Wähle dein Level!</div><div class="lvlsel" style="margin-bottom:13px"><button class="lvlbtn ${mLv===1?'active':''}" onclick="mSL(1)">🥷 Schüler</button><button class="lvlbtn ${mLv===2?'active':''}" onclick="mSL(2)">⚔ Krieger</button><button class="lvlbtn ${mLv===3?'active':''}" onclick="mSL(3)">🐉 Meister</button></div><div class="sdesc-d">${ds}<br><br>10 Aufgaben — jede Runde neu!</div><button class="btn-ms" onclick="mInit()">🚀 Starten</button></div>`;return;}
  if(mPhase==='done'){const ok=mRes.filter(r=>r.ok).length;const li=mRes.map(r=>`<div class="gri ${r.ok?'ok':'nope'}"><span>${r.ok?'✅':'❌'}</span><span class="ge" style="font-family:'Fredoka One',cursive">${r.q.replace('?',r.ans)}</span>${!r.ok?`<span style="opacity:.6;font-size:.75rem">Du: ${r.sel}</span>`:''}</div>`).join('');el.innerHTML=`${backBtn(true)}<div class="glass-card-result"><div class="rtitle" style="background:linear-gradient(135deg,#4CC9F0,#C77DFF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Geschafft! ${emojiForScore(ok)}</div><span class="remoji">${emojiForScore(ok)}</span><div class="rscore" style="color:#FFD700">${ok} / 10</div><div style="font-weight:700;color:rgba(255,255,255,.65);margin:5px 0 13px">${msgForScore(ok)}</div><div class="results-list">${li}</div>${endButtons("mPhase='start';mRender()")}</div>`;if(ok>=7)setTimeout(()=>confetti(['#4CC9F0','#FFD700','#4ECDC4','#FF6B9D']),200);return;}
  const q=mR[mC];const ch=mGC(q.ans);const pct=(mC/10)*100;const[ol,oc]=opI(q.op);
  const bt=ch.map((c,i)=>`<button class="mcb mc${i}" onclick="mSel2(${c},this)">${c}</button>`).join('');

}

/* ═══ MEMORY ═══ */
const MEM_SETS=[
['🐱','🐶','🦁','🐯','🐰','🐻','🦊','🐼'],
['🍎','🍌','🍓','🍇','🥕','🍅','🍊','🍋'],
['☀️','🌙','⭐','🌈','❄️','⚡','☁️','🔥'],
['🚗','✈️','🚂','🚲','🚀','⛵','🚒','🚜'],
];
let memCards=[],memFlipped=[],memMatched=[],memMoves=0,memStart=0,memTimer=null;
function memInit(){
  const set=MEM_SETS[Math.floor(Math.random()*MEM_SETS.length)];
  const pairs=set.slice(0,8);
  memCards=shuffle([...pairs,...pairs]).map((e,i)=>({id:i,emoji:e,flipped:false,matched:false}));
  memFlipped=[];memMatched=[];memMoves=0;memStart=Date.now();
  if(memTimer)clearInterval(memTimer);
  memTimer=setInterval(()=>{const t=document.getElementById('mem-time');if(t&&memMatched.length<16)t.textContent=Math.floor((Date.now()-memStart)/1000)+'s';},500);
  memRender();
}
function memRender(){
  const el=document.getElementById('memory-content');
  if(memMatched.length>=16){
    if(memTimer)clearInterval(memTimer);
    const time=Math.floor((Date.now()-memStart)/1000);
    el.innerHTML=`${backBtn(true)}<div class="glass-card-result"><div class="rtitle" style="color:#FFD700;text-shadow:2px 2px 0 #B8860B">🎉 Geschafft!</div><span class="remoji">🏆</span><div style="font-family:'Fredoka One',cursive;font-size:1.5rem;color:#FFD700;margin:8px 0">⏱️ ${time} Sek · 🎯 ${memMoves} Züge</div><div style="font-weight:700;color:rgba(255,255,255,.7);margin-bottom:14px">${memMoves<=12?'Spinjitzu Meister!':memMoves<=20?'Echter Ninja!':'Toll gemacht!'}</div>${endButtons('memInit()')}</div>`;
    setTimeout(()=>confetti(['#FFD700','#4ECDC4','#FF6B9D','#4CC9F0']),200);return;
  }
  const cards=memCards.map((c)=>{
    const cls=c.matched?'matched':c.flipped?'flipped':'';
    return `<button class="mem-card ${cls}" onclick="memFlip(${c.id})" ${c.flipped||c.matched?'disabled':''}>${c.flipped||c.matched?c.emoji:'<span class="mem-back">❓</span>'}</button>`;
  }).join('');
  el.innerHTML=`${backBtn(true)}<div class="dark-header"><span class="gicon">🎴</span><h1 style="background:linear-gradient(135deg,#4ECDC4,#2ECC71);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Erd-Memory</h1><div class="gsub">Finde alle Erd-Paare!</div></div><div class="mem-stats"><div class="mem-stat">🎯 <b>${memMoves}</b> Züge</div><div class="mem-stat">⏱️ <b id="mem-time">0s</b></div></div><div class="mem-grid cols4">${cards}</div>`;
}
function memFlip(id){
  if(memFlipped.length>=2)return;
  const c=memCards.find(c=>c.id===id);
  if(!c||c.flipped||c.matched)return;
  c.flipped=true;memFlipped.push(c);memRender();
  if(memFlipped.length===2){
    memMoves++;
    const[a,b]=memFlipped;
    if(a.emoji===b.emoji){
      setTimeout(()=>{a.matched=true;b.matched=true;memMatched.push(a.id,b.id);memFlipped=[];memRender();confetti(['#4ECDC4','#FFD700']);},600);
    }else{
      setTimeout(()=>{a.flipped=false;b.flipped=false;memFlipped=[];memRender();},900);
    }
  }
}

function clNext(){
  clAnswered=false;

  clCur={h,m,txt:`${h}:${m.toString().padStart(2,'0')}`};
  const wrong=new Set();while(wrong.size<3){const wh=rnd(1,12);const wm=[0,15,30,45][Math.floor(Math.random()*4)];const t=`${wh}:${wm.toString().padStart(2,'0')}`;if(t!==clCur.txt)wrong.add(t);}

}
function clockSVG(h,m){
  const hAng=((h%12)*30+m*0.5-90)*Math.PI/180;
  const mAng=(m*6-90)*Math.PI/180;
  const hX=100+45*Math.cos(hAng),hY=100+45*Math.sin(hAng);
  const mX=100+70*Math.cos(mAng),mY=100+70*Math.sin(mAng);
  let nums='';for(let i=1;i<=12;i++){const a=(i*30-90)*Math.PI/180;const x=100+80*Math.cos(a),y=100+80*Math.sin(a);nums+=`<text x="${x}" y="${y+5}" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold" font-family="Fredoka One">${i}</text>`;}
  return `<svg class="clock-svg" viewBox="0 0 200 200"><circle cx="100" cy="100" r="92" fill="rgba(255,255,255,.1)" stroke="#FFD700" stroke-width="4"/>${nums}<line x1="100" y1="100" x2="${hX}" y2="${hY}" stroke="#fff" stroke-width="6" stroke-linecap="round"/><line x1="100" y1="100" x2="${mX}" y2="${mY}" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/><circle cx="100" cy="100" r="5" fill="#FFD700"/></svg>`;
}
function clRender(){
  const el=document.getElementById('clock-content');
  if(clRound>=10){
    el.innerHTML=`${backBtn(true)}<div class="glass-card-result"><div class="rtitle" style="background:linear-gradient(135deg,#EC4899,#8B5CF6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Geschafft! ${emojiForScore(clScore)}</div><span class="remoji">${emojiForScore(clScore)}</span><div class="rscore" style="color:#EC4899">${clScore} / 10</div><div style="font-weight:700;color:rgba(255,255,255,.65);margin:5px 0 14px">${msgForScore(clScore)}</div>${endButtons('clInit()')}</div>`;
    if(clScore>=7)setTimeout(()=>confetti(['#EC4899','#8B5CF6','#FFD700']),200);return;
  }
  const ch=clChoices.map((t,i)=>`<button class="mcb mc${i}" style="width:auto;padding:12px 18px;font-size:1.3rem" onclick="clAns('${t}',this)">${t}</button>`).join('');
  const pct=(clRound/10)*100;
  el.innerHTML=`${backBtn(true)}<div class="dark-header"><span class="gicon">🕐</span><h1 style="background:linear-gradient(135deg,#EC4899,#8B5CF6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Zeit-Meister</h1><div class="gsub">Welche Zeit zeigt die Uhr?</div></div><div class="progress-label">Frage ${clRound+1} / 10 · 🎯 ${clScore}</div><div class="progress-wrap"><div class="progress-bar-inner" style="width:${pct}%;background:linear-gradient(90deg,#EC4899,#8B5CF6)"></div></div><div class="glass-card">${clockSVG(clCur.h,clCur.m)}<div style="color:rgba(255,255,255,.6);font-size:.85rem;font-weight:700;margin-bottom:10px">Welche Uhrzeit zeigt die Uhr?</div><div class="mchoices" style="flex-wrap:wrap">${ch}</div><div class="feedback-line" id="clfb"></div></div>`;
}
function clAns(t,btn){
  if(clAnswered)return;clAnswered=true;
  document.querySelectorAll('.mcb').forEach(b=>b.disabled=true);
  const fb=document.getElementById('clfb');
  if(t===clCur.txt){btn.style.background='linear-gradient(135deg,#43A047,#66BB6A)';clScore++;fb.textContent='🎉 Richtig!';fb.className='feedback-line good';confetti(['#EC4899','#8B5CF6']);}
  else{btn.style.background='linear-gradient(135deg,#E53935,#B71C1C)';fb.textContent=`❌ Es war ${clCur.txt}`;fb.className='feedback-line bad';}
  setTimeout(()=>{clRound++;clNext();},1700);
}

/* ═══ FLAGS ═══ */
const FLAGS=[
{f:'🇩🇪',n:'Deutschland'},{f:'🇦🇹',n:'Österreich'},{f:'🇨🇭',n:'Schweiz'},{f:'🇫🇷',n:'Frankreich'},
{f:'🇮🇹',n:'Italien'},{f:'🇪🇸',n:'Spanien'},{f:'🇬🇧',n:'England'},{f:'🇺🇸',n:'USA'},
{f:'🇨🇦',n:'Kanada'},{f:'🇯🇵',n:'Japan'},{f:'🇨🇳',n:'China'},{f:'🇧🇷',n:'Brasilien'},
{f:'🇦🇺',n:'Australien'},{f:'🇳🇱',n:'Niederlande'},{f:'🇧🇪',n:'Belgien'},{f:'🇸🇪',n:'Schweden'},
{f:'🇳🇴',n:'Norwegen'},{f:'🇩🇰',n:'Dänemark'},{f:'🇫🇮',n:'Finnland'},{f:'🇵🇱',n:'Polen'},
];
let flCur=null,flScore=0,flRound=0,flAnswered=false,flChoices=[];
function flInit(){flScore=0;flRound=0;flNext();}
function flNext(){
  flAnswered=false;flCur=FLAGS[Math.floor(Math.random()*FLAGS.length)];
  const wrong=shuffle(FLAGS.filter(f=>f.n!==flCur.n)).slice(0,3);

}
function flRender(){

    el.innerHTML=`${backBtn(true)}<div class="glass-card-result"><div class="rtitle" style="background:linear-gradient(135deg,#10B981,#059669);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Geschafft! ${emojiForScore(flScore)}</div><span class="remoji">${emojiForScore(flScore)}</span><div class="rscore" style="color:#10B981">${flScore} / 10</div><div style="font-weight:700;color:rgba(255,255,255,.65);margin:5px 0 14px">${msgForScore(flScore)}</div>${endButtons('flInit()')}</div>`;
    if(flScore>=7)setTimeout(()=>confetti(['#10B981','#059669','#FFD700']),200);return;
  }
  const ch=flChoices.map((c,i)=>`<button class="mcb mc${i}" style="width:auto;padding:12px 16px;font-size:1.05rem" onclick="flAns('${c.n}',this)">${c.n}</button>`).join('');
  const pct=(flRound/10)*100;
  el.innerHTML=`${backBtn(true)}<div class="dark-header"><span class="gicon">🚩</span><h1 style="background:linear-gradient(135deg,#10B981,#059669);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Reiche</h1><div class="gsub">Welches Reich?</div></div><div class="progress-label">Frage ${flRound+1} / 10 · 🎯 ${flScore}</div><div class="progress-wrap"><div class="progress-bar-inner" style="width:${pct}%;background:linear-gradient(90deg,#10B981,#059669)"></div></div><div class="glass-card"><div class="flag-display">${flCur.f}</div><div style="color:rgba(255,255,255,.6);font-size:.85rem;font-weight:700;margin:10px 0">Welches Land hat diese Flagge?</div><div class="mchoices" style="flex-wrap:wrap">${ch}</div><div class="feedback-line" id="flfb"></div></div>`;
}
function flAns(n,btn){
  if(flAnswered)return;flAnswered=true;
  document.querySelectorAll('.mcb').forEach(b=>b.disabled=true);
  const fb=document.getElementById('flfb');
  if(n===flCur.n){btn.style.background='linear-gradient(135deg,#43A047,#66BB6A)';flScore++;fb.textContent='🎉 Richtig!';fb.className='feedback-line good';confetti(['#10B981','#059669']);}
  else{btn.style.background='linear-gradient(135deg,#E53935,#B71C1C)';fb.textContent=`❌ Es war ${flCur.n}`;fb.className='feedback-line bad';}
  setTimeout(()=>{flRound++;flNext();},1700);
}

/* ═══ SEQUENCE ═══ */
let sqCur=null,sqScore=0,sqRound=0,sqSel=null,sqAnswered=false,sqChoices=[];
function sqGen(){
  const types=[
    ()=>{const s=rnd(1,5),step=rnd(1,3);return{seq:[s,s+step,s+step*2,s+step*3,s+step*4],ans:s+step*5,disp:[true,true,true,true,true,false]};},
    ()=>{const s=rnd(20,50),step=rnd(1,4);return{seq:[s,s-step,s-step*2,s-step*3,s-step*4],ans:s-step*5,disp:[true,true,true,true,true,false]};},
    ()=>{const s=rnd(2,5);return{seq:[s,s*2,s*3,s*4],ans:s*5,disp:[true,true,true,true,false]};},
  ];
  return types[Math.floor(Math.random()*types.length)]();
}
function sqInit(){sqScore=0;sqRound=0;sqNext();}
function sqNext(){
  sqAnswered=false;sqSel=null;sqCur=sqGen();
  const wrong=new Set([sqCur.ans]);while(wrong.size<4){const w=sqCur.ans+(Math.random()>.5?1:-1)*rnd(1,5);if(w!==sqCur.ans&&w>=0)wrong.add(w);}
  sqChoices=shuffle([...wrong]);
  sqRender();
}
function sqRender(){
  const el=document.getElementById('sequence-content');
  if(sqRound>=10){
    el.innerHTML=`${backBtn(true)}<div class="glass-card-result"><div class="rtitle" style="background:linear-gradient(135deg,#F472B6,#DB2777);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Geschafft! ${emojiForScore(sqScore)}</div><span class="remoji">${emojiForScore(sqScore)}</span><div class="rscore" style="color:#F472B6">${sqScore} / 10</div><div style="font-weight:700;color:rgba(255,255,255,.65);margin:5px 0 14px">${msgForScore(sqScore)}</div>${endButtons('sqInit()')}</div>`;
    if(sqScore>=7)setTimeout(()=>confetti(['#F472B6','#DB2777','#FFD700']),200);return;
  }
  const items=sqCur.seq.map(n=>`<div class="seq-item">${n}</div>`).join('')+`<div class="seq-item blank ${sqSel!==null?'sel':''}" id="sqb">${sqSel!==null?sqSel:'?'}</div>`;
  const ch=sqChoices.map((n,i)=>`<button class="mcb mc${i}" onclick="sqSel2(${n},this)">${n}</button>`).join('');
  const pct=(sqRound/10)*100;
  el.innerHTML=`${backBtn(true)}<div class="dark-header"><span class="gicon">🔢</span><h1 style="background:linear-gradient(135deg,#F472B6,#DB2777);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Blitz-Logik</h1><div class="gsub">Welcher Blitz fehlt?</div></div><div class="progress-label">Frage ${sqRound+1} / 10 · 🎯 ${sqScore}</div><div class="progress-wrap"><div class="progress-bar-inner" style="width:${pct}%;background:linear-gradient(90deg,#F472B6,#DB2777)"></div></div><div class="glass-card"><div style="color:rgba(255,255,255,.6);font-size:.85rem;font-weight:700;margin-bottom:10px">Welche Zahl fehlt?</div><div class="seq-display">${items}</div><div class="mchoices">${ch}</div><div class="feedback-line" id="sqfb"></div></div>`;
}
function sqSel2(n,btn){
  if(sqAnswered)return;sqAnswered=true;
  document.querySelectorAll('.mcb').forEach(b=>b.disabled=true);
  const bx=document.getElementById('sqb');const fb=document.getElementById('sqfb');
  if(n===sqCur.ans){bx.classList.add('correct');btn.style.background='linear-gradient(135deg,#43A047,#66BB6A)';bx.textContent=n;sqScore++;fb.textContent='🎉 Richtig!';fb.className='feedback-line good';confetti(['#F472B6','#DB2777']);}
  else{btn.style.background='linear-gradient(135deg,#E53935,#B71C1C)';bx.textContent=n;bx.style.color='#E53935';fb.textContent=`❌ Es war ${sqCur.ans}`;fb.className='feedback-line bad';}
  setTimeout(()=>{sqRound++;sqNext();},1700);
}

/* ═══ ODD ONE OUT ═══ */
const ODD_SETS=[
{set:['🐶','🐱','🐰','🚗'],odd:3,cat:'Tiere'},
{set:['🍎','🍌','🍓','🚂'],odd:3,cat:'Obst'},
{set:['🚗','✈️','🚂','🍎'],odd:3,cat:'Fahrzeuge'},
{set:['☀️','🌙','⭐','🐶'],odd:3,cat:'Himmel'},
{set:['🌹','🌻','🌷','🐱'],odd:3,cat:'Blumen'},
{set:['🐘','🦒','🦁','🍎'],odd:3,cat:'Tiere'},
{set:['🥕','🥦','🍅','🚗'],odd:3,cat:'Gemüse'},
{set:['⚽','🏀','🎾','🍎'],odd:3,cat:'Bälle'},
{set:['🎸','🥁','🎹','🍎'],odd:3,cat:'Musik'},
{set:['🐝','🦋','🐞','🚗'],odd:3,cat:'Insekten'},
{set:['❄️','🌨️','⛄','☀️'],odd:3,cat:'Winter'},
{set:['🍕','🍔','🍟','🐶'],odd:3,cat:'Essen'},
{set:['🐟','🐬','🦈','🐶'],odd:3,cat:'Wassertiere'},
{set:['🌳','🌴','🌲','🐱'],odd:3,cat:'Bäume'},
{set:['📚','📖','📕','🍎'],odd:3,cat:'Bücher'},
];
let odCur=null,odScore=0,odRound=0,odAnswered=false;
function odInit(){odScore=0;odRound=0;odNext();}
function odNext(){
  odAnswered=false;
  const tpl=ODD_SETS[Math.floor(Math.random()*ODD_SETS.length)];
  // Shuffle so position is randomized
  const indexed=tpl.set.map((e,i)=>({e,isOdd:i===tpl.odd}));
  odCur={items:shuffle(indexed),cat:tpl.cat};
  odRender();
}
function odRender(){
  const el=document.getElementById('odd-content');
  if(odRound>=10){
    el.innerHTML=`${backBtn(true)}<div class="glass-card-result"><div class="rtitle" style="background:linear-gradient(135deg,#FB923C,#EA580C);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Geschafft! ${emojiForScore(odScore)}</div><span class="remoji">${emojiForScore(odScore)}</span><div class="rscore" style="color:#FB923C">${odScore} / 10</div><div style="font-weight:700;color:rgba(255,255,255,.65);margin:5px 0 14px">${msgForScore(odScore)}</div>${endButtons('odInit()')}</div>`;
    if(odScore>=7)setTimeout(()=>confetti(['#FB923C','#EA580C','#FFD700']),200);return;
  }
  const ch=odCur.items.map((it,i)=>`<button class="odd-card" onclick="odAns(${i},this,${it.isOdd})" data-odd="${it.isOdd}">${it.e}</button>`).join('');
  const pct=(odRound/10)*100;
  el.innerHTML=`${backBtn(true)}<div class="dark-header"><span class="gicon">🎯</span><h1 style="background:linear-gradient(135deg,#FB923C,#EA580C);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Eindringling</h1><div class="gsub">Finde den Außenseiter!</div></div><div class="progress-label">Frage ${odRound+1} / 10 · 🎯 ${odScore}</div><div class="progress-wrap"><div class="progress-bar-inner" style="width:${pct}%;background:linear-gradient(90deg,#FB923C,#EA580C)"></div></div><div class="glass-card"><div style="color:rgba(255,255,255,.6);font-size:.85rem;font-weight:700;margin-bottom:12px">Welches Bild gehört nicht dazu?</div><div class="odd-grid" style="grid-template-columns:1fr 1fr">${ch}</div><div class="feedback-line" id="odfb"></div></div>`;
}
function odAns(i,btn,isOdd){
  if(odAnswered)return;odAnswered=true;
  document.querySelectorAll('.odd-card').forEach(b=>b.disabled=true);
  const fb=document.getElementById('odfb');
  if(isOdd){btn.classList.add('correct');odScore++;fb.textContent='🎉 Richtig!';fb.className='feedback-line good';confetti(['#FB923C','#EA580C']);}
  else{btn.classList.add('wrong');document.querySelectorAll('.odd-card').forEach(b=>{if(b.dataset.odd==='true')b.classList.add('correct');});fb.textContent='❌ Falsch!';fb.className='feedback-line bad';}
  setTimeout(()=>{odRound++;odNext();},1500);
}

/* ═══ COMPARE (more/less/equal) ═══ */
let cpL=0,cpR=0,cpScore=0,cpRound=0,cpAnswered=false,cpEmoji='🍎';
const CP_EMOJIS=['🍎','⭐','🍌','🐱','🌸','🎈','🍓','⚽'];
function cpInit(){cpScore=0;cpRound=0;cpNext();}
function cpNext(){
  cpAnswered=false;
  cpL=rnd(1,9);cpR=rnd(1,9);
  cpEmoji=CP_EMOJIS[Math.floor(Math.random()*CP_EMOJIS.length)];
  cpRender();
}
function cpRender(){
  const el=document.getElementById('compare-content');
  if(cpRound>=10){
    el.innerHTML=`${backBtn(true)}<div class="glass-card-result"><div class="rtitle" style="background:linear-gradient(135deg,#6EE7B7,#0D9488);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Geschafft! ${emojiForScore(cpScore)}</div><span class="remoji">${emojiForScore(cpScore)}</span><div class="rscore" style="color:#6EE7B7">${cpScore} / 10</div><div style="font-weight:700;color:rgba(255,255,255,.65);margin:5px 0 14px">${msgForScore(cpScore)}</div>${endButtons('cpInit()')}</div>`;
    if(cpScore>=7)setTimeout(()=>confetti(['#6EE7B7','#0D9488','#FFD700']),200);return;
  }
  const left=Array(cpL).fill(cpEmoji).join(' ');
  const right=Array(cpR).fill(cpEmoji).join(' ');
  const pct=(cpRound/10)*100;
  el.innerHTML=`${backBtn(true)}<div class="dark-header"><span class="gicon">⚖️</span><h1 style="background:linear-gradient(135deg,#6EE7B7,#0D9488);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Balance</h1><div class="gsub">Wer ist stärker?</div></div><div class="progress-label">Frage ${cpRound+1} / 10 · 🎯 ${cpScore}</div><div class="progress-wrap"><div class="progress-bar-inner" style="width:${pct}%;background:linear-gradient(90deg,#6EE7B7,#0D9488)"></div></div><div class="glass-card"><div style="color:rgba(255,255,255,.6);font-size:.85rem;font-weight:700;margin-bottom:8px">Welches Zeichen passt?</div><div class="compare-row"><div class="compare-side">${left}</div><div style="font-family:'Fredoka One',cursive;font-size:1.6rem;color:#FFD700">?</div><div class="compare-side">${right}</div></div><div style="font-family:'Fredoka One',cursive;color:white;font-size:1.4rem;margin:8px 0">${cpL} ? ${cpR}</div><div class="compare-ops"><button class="cmp-btn" onclick="cpAns('<',this)">&lt;</button><button class="cmp-btn" onclick="cpAns('=',this)">=</button><button class="cmp-btn" onclick="cpAns('>',this)">&gt;</button></div><div class="feedback-line" id="cpfb"></div></div>`;
}
function cpAns(op,btn){
  if(cpAnswered)return;cpAnswered=true;
  document.querySelectorAll('.cmp-btn').forEach(b=>b.disabled=true);
  let cor='=';if(cpL<cpR)cor='<';else if(cpL>cpR)cor='>';
  const fb=document.getElementById('cpfb');
  if(op===cor){btn.classList.add('correct');cpScore++;fb.textContent='🎉 Richtig!';fb.className='feedback-line good';confetti(['#6EE7B7','#0D9488']);}
  else{btn.classList.add('wrong');document.querySelectorAll('.cmp-btn').forEach(b=>{if(b.textContent.trim()===cor)b.classList.add('correct');});fb.textContent=`❌ Es war "${cor}"`;fb.className='feedback-line bad';}
  setTimeout(()=>{cpRound++;cpNext();},1500);
}
